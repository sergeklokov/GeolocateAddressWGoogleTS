<!DOCTYPE html>
<html>
  <head>
    <title>Simple Marker</title>
    
    <script async src="https://maps.googleapis.com/maps/api/js?key=BIzaSyApUD1TQRJtKd-CgLdfY1yUTDU8lp7I7nw&callback=initMap&libraries=maps,marker&v=beta">
    </script>

    <style>
      /* Always set the map height explicitly to define the size of the div
       * element that contains the map. */
      gmp-map {
        height: 100%;
      }

      /* Optional: Makes the sample page fill the window. */
      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
      }
    </style>

    <script>
      // The callback function executed once the Google Maps API has loaded
      function initMap() {
        console.log("Google Maps API successfully loaded.");
        // You can add additional map initialization or logic here if needed
      }
    </script>
  </head>
  <body>
    <gmp-map center="33.446634934033014, -112.0758743796831" zoom="4" map-id="DEMO_MAP_ID">
      <gmp-advanced-marker position="33.446634934033014, -112.0758743796831" title="My location"></gmp-advanced-marker>
    </gmp-map>
  </body>
</html>
